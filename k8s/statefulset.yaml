## Coordinator StatefulSet — Raft consensus + task scheduling only.
## Coordinators hold no file state. Input comes from Kafka (KafkaDataSource).
## Intermediate files are written/read exclusively by worker pods.
## Kafka task queue replaces the in-memory JobStatus priority queue.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: go-flink
spec:
  serviceName: go-flink
  replicas: 3
  selector:
    matchLabels:
      app: go-flink
  template:
    metadata:
      labels:
        app: go-flink
    spec:
      containers:
      - name: node
        image: goflink:v1.0.0
        imagePullPolicy: IfNotPresent
        command:
        - /usr/local/bin/go-flink
        - node
        - --node-id=$(POD_NAME)
        - --raft-bind=:7000
        - --raft-advertise=$(POD_NAME).go-flink:7000
        - --raft-peers=go-flink-0.go-flink:7000=go-flink-0.go-flink:8000,go-flink-1.go-flink:7000=go-flink-1.go-flink:8000,go-flink-2.go-flink:7000=go-flink-2.go-flink:8000
        - --bind=:8000
        - --data-dir=/data/raft
        - --kafka-brokers=kafka:9092
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: pipeline-secrets
              key: mongo-uri
              optional: true
        ports:
        - name: raft
          containerPort: 7000
        - name: rpc
          containerPort: 8000
        volumeMounts:
        - name: raft-data
          mountPath: /data/raft
        - name: input
          mountPath: /data/input
      volumes:
      - name: input
        hostPath:
          path: /mnt/datasets
          type: DirectoryOrCreate
  volumeClaimTemplates:
  - metadata:
      name: raft-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
